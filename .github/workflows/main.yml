name: Python CI

concurrency:
  group: python-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  # Tagged commits are verified by the publishing workflows through workflow_call.
  # Keeping tags out of this trigger avoids an unguarded duplicate CI run on releases.
  push:
    branches:
      - '**'
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: constraints-dev.txt

      - name: Install package and pinned development tools
        run: |
          python -m pip install --requirement constraints-dev.txt
          python -m pip install --editable .

      - name: Run tests with coverage
        run: python -m pytest -q --cov=ivt_filter --cov-report=term-missing --cov-report=xml --cov-fail-under=58

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: constraints-dev.txt
      - name: Install pinned development tools
        run: python -m pip install --requirement constraints-dev.txt
      - name: Lint package
        run: ruff check ivt_filter

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: constraints-dev.txt
      - name: Install package and pinned development tools
        run: |
          python -m pip install --requirement constraints-dev.txt
          python -m pip install --editable .
      - name: Type check package
        run: mypy ivt_filter

  package-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: constraints-dev.txt
      - name: Install pinned development tools
        run: python -m pip install --requirement constraints-dev.txt
      - name: Build distributions
        run: python -m build
      - name: Install wheel into isolated environment
        run: |
          python -m venv /tmp/ivt-wheel-smoke
          /tmp/ivt-wheel-smoke/bin/python -m pip install dist/*.whl
      - name: Verify installed wheel import and CLI
        working-directory: /tmp
        run: |
          /tmp/ivt-wheel-smoke/bin/python -c "import ivt_filter"
          /tmp/ivt-wheel-smoke/bin/python -m ivt_filter.cli --help
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: dist-packages
          path: dist/*

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Build container
        run: docker build --tag tobii-ivt-filter:smoke .
      - name: Verify container CLI
        run: docker run --rm tobii-ivt-filter:smoke --help
      - name: Verify container package import
        run: docker run --rm --entrypoint python tobii-ivt-filter:smoke -c "import ivt_filter"
